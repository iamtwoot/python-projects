{% extends 'base.html' %}

{% block title %}Add Movie{% endblock %}

{% block content %}
<div class="content">
  <h1 class="heading mb-3">Add a Movie</h1>

  <form method="POST" class="mx-auto text-start" style="max-width: 480px;">
    {{ form.csrf_token }}

    <div class="mb-4">
      {{ form.title.label(class="form-label") }}
      {{ form.title(class="form-control") }}
      {% for error in form.title.errors %}
        <div class="form-text text-danger">{{ error }}</div>
      {% endfor %}
    </div>

    <button type="submit" class="btn btn-primary w-100">Add Movie</button>
  </form>
</div>
{% endblock %}
