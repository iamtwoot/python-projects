<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Rating</title>
</head>
<body>
    <p>Book name: {{ book.title }}</p>
    <p>Current rating: {{ book.rating }}</p>
    <form action="{{ url_for('edit', book_id=book.id) }}" method="post">
        <input type="text" name="new_rating" placeholder="New Rating">
        <input type="submit" value="Change Rating">
    </form>
</body>
</html>
